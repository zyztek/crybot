# Dependabot Configuration
# https://docs.github.com/en/code-security/dependabot

version: 2

updates:
  # Enable version updates for npm (frontend)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "zyztek"
    assignees:
      - "zyztek"
    commit-message:
      prefix: "chore"
      include: "scope"
      prefix: 'chore'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'backend'
    reviewers:
      - 'zyztek'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    labels:
      - 'ci'
      - 'github-actions'

  # Docker
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    labels:
      - 'docker'
