# Code Quality & Security Scanning
name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Disabled - requires SONAR_TOKEN secret and causes failures
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  # CodeQL is now consolidated in .github/workflows/codeql.yml
  # to avoid duplicate runs
  sonarcloud:
    runs-on: ubuntu-latest
    if: false # Disabled - requires SONAR_TOKEN
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Disabled - causes failures without proper secrets
  dependency-review:
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC

  # Disabled - causes failures without proper configuration
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    if: false # Disabled - requires OSSF scorecard setup
    steps:
      - uses: actions/checkout@v6

      - name: Run Scorecard
        uses: ossf/scorecard-action@0864cf434267fc06e5f7c1f4e7f0f4b3a0c3aabd
        with:
          results_file: results.sarif
          results_format: sarif

      - name: Upload Scorecard Results
        uses: github/codeql-action/upload-results@v4
        with:
          sarif_file: results.sarif
