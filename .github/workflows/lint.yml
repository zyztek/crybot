# Lint Workflow
name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --prefer-offline --legacy-peer-deps || npm ci --legacy-peer-deps || npm install --legacy-peer-deps
        timeout-minutes: 10

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npx prettier --check . || true

      - name: TypeScript check
        run: npx tsc --noEmit
