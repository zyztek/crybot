# CodeQL Security Analysis
name: "CodeQL Security"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan

# Enable concurrent workflows
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    
    # Required permissions for CodeQL
    permissions:
      actions: read
      contents: read
      security-events: write
    
    # Matrix for different language groups
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript
          - typescript
    
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          sparse-checkout: |
            src
            server
            package.json
            server/package.json
          sparse-checkout-cone-mode: false
      
      # Initialize CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          
          # Security-focused query suites
          queries: security-extended
          
          # Build mode for JavaScript/TypeScript (no build needed)
          build-mode: none
      
      # Perform CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          
          # Upload results even on failure for debugging
          upload: always
      
      # Upload SARIF results for security tab
      - name: Upload Security Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results-${{ matrix.language }}
          path: results.sarif
          retention-days: 30

  # Separate job for dependency scanning
  codeql-deps:
    name: CodeQL Dependency Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --ignore-scripts
      
      - name: Initialize CodeQL for dependencies
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
          queries: +security-extended
      
      - name: Perform CodeQL Dependency Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/dependency"