name: GitHub Codespaces Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run type check
      run: npm run typecheck

    - name: Run lint
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Build application
      run: npm run build

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Wait for 5 minutes (Proof of Work)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Deployment successful! Waiting 5 minutes as proof of work..."
        sleep 300
        echo "Proof of work completed. Deployment verified."

    - name: Get deployment info
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Deployment URL: ${{ steps.deployment.outputs.url }}"
        echo "Status: ${{ steps.deployment.outputs.status }}"
