# Scheduled Tasks and Maintenance
name: Scheduled Maintenance

on:
  schedule:
    # Daily at 2:00 UTC - Health check
    - cron: '0 2 * * *'
    # Weekly on Monday at 3:00 UTC - Database cleanup
    - cron: '0 3 * * 1'
    # Monthly on 1st at 4:00 UTC - Full backup
    - cron: '0 4 1 * *'

jobs:
  health-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 2 * *'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check backend health
        run: |
          curl -f http://localhost:3000/health || exit 1
        shell: bash

      - name: Check frontend availability
        run: |
          curl -f http://localhost:5173 || exit 1
        shell: bash

  weekly-maintenance:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * 1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

      - name: Update dependency graph
        run: npm install --package-lock-only

      - name: Create maintenance issue
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Weekly Maintenance - ' + new Date().toISOString().split('T')[0],
              body: 'Weekly dependency and security updates'
            })

  monthly-backup:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 1 * *'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create backup archive
        run: |
          tar -czf backup-${{ github.run_id }}.tar.gz \
            package.json package-lock.json \
            server/package.json server/package-lock.json \
            prisma/ .env.example

      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: monthly-backup
          path: backup-*.tar.gz
          retention-days: 90
