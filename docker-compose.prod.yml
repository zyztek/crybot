services:
  postgres:
    image: postgres:16-alpine
    container_name: crybot-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: crybot
      POSTGRES_USER: crybot
      POSTGRES_PASSWORD: crybot_prod_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crybot -d crybot']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: crybot-backend-prod
    restart: unless-stopped
    env_file:
      - ./server/.env.production
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/health/ready']
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: crybot-frontend-prod
    restart: unless-stopped
    env_file:
      - ./.env.production
    ports:
      - '80:80'
    depends_on:
      - backend
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/health']
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
