# CryptoFaucet Hub - Docker Compose

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: crybot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crybot
      POSTGRES_USER: crybot
      POSTGRES_PASSWORD: crybot_dev_password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crybot -d crybot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: crybot-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://crybot:crybot_dev_password@postgres:5432/crybot?schema=public
      - JWT_SECRET=crybot-dev-jwt-secret-key-minimum-32-characters
      - CORS_ORIGIN=http://frontend
      - SEPOLIA_RPC_URL=https://rpc.sepolia.org
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend Web Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crybot-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:3000/api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3